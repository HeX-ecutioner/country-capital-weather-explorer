<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>Country & Capital Weather Explorer</title>

    <link rel="icon" href="./assets/favicon.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Background Animated Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <main class="main-container">
        <div class="central-card">
            <header>
                <h1 class="title">Country & Capital Weather Explorer</h1>
            </header>

            <section class="search-area">
                <div class="row">
                    <div class="input-wrapper">
                        <input id="countryInput" type="text" placeholder="Enter country name (e.g. France)" autocomplete="off">
                        <div id="autocompleteList" class="autocomplete-list hidden"></div>
                    </div>
                    <button id="searchBtn">Search</button>
                    <button id="geoBtn" title="Find my country via Geolocation">Use My Location</button>
                    <button id="randomBtn" title="Pick a random country for me!">Take Me Anywhere 🎲</button>
                </div>
                <div class="hint">Tip: Try "India", "Japan" or "USA"</div>
            </section>

            <section class="result-area" aria-live="polite">
                <div id="loading" class="loading hidden">Loading…</div>
                <div id="resultPanels" class="result-panels hidden">
                    <div id="countryInfo" class="info-panel country-panel"></div>
                    <div id="weatherInfo" class="info-panel weather-panel"></div>
                    <div id="timePanel" class="info-panel time-panel hidden"></div>
                    <div id="currencyPanel" class="info-panel currency-panel hidden"></div>
                    <div id="wikiPanel" class="info-panel wiki-panel hidden"></div>
                    <div id="travelPanel" class="info-panel travel-panel hidden"></div>
                    <div id="hourlyPanel" class="info-panel hourly-panel hidden">
                        <h2>Hourly Forecast</h2>
                        <div class="hourly-carousel" id="hourlyCarousel"></div>
                    </div>
                    <div id="chartPanel" class="info-panel chart-panel hidden">
                        <h2>5-Day Forecast</h2>
                        <div class="chart-container">
                            <canvas id="forecastChart"></canvas>
                        </div>
                    </div>
                </div>
            </section>

            <div class="bottom-row">
                <div class="switch-container">
                    <div id="darkModeSwitch" title="Switch to Dark Mode">
                        <div class="slider">
                            <span class="icon">🌙</span>
                        </div>
                    </div>
                    <div id="tempUnitSwitch" title="Switch to Fahrenheit">
                        <div class="slider">
                            <span class="icon">°C</span>
                        </div>
                    </div>
                </div>
                <footer class="footer">
                    <small>Uses REST Countries & OpenWeatherMap</small>
                </footer>
            </div>
        </div>
    </main>

    <script type="module" src="./js/main.js"></script>
</body>

</html>
